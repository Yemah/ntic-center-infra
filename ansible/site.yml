---
- name: Installation Nginx et supervision sur tous les serveurs
  hosts: all
  become: yes

  tasks:
    - name: Mettre à jour le cache apt
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Installer Nginx
      apt:
        name: nginx
        state: present

    - name: Créer page index personnalisée
      copy:
        dest: /var/www/html/index.html
        content: |
          <!DOCTYPE html>
          <html lang="fr">
          <head>
            <meta charset="utf-8">
            <title>NTIC CENTER CORPORATION</title>
            <style>
              body { font-family: sans-serif; line-height: 1.6; padding: 20px; color: #333; }
              h1 { color: #2c3e50; }
              .container { max-width: 800px; margin: auto; border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>Site {{ inventory_hostname }}</h1>
              <p>Infrastructure déployée par Terraform + Ansible</p>
              <p><strong>NTIC CENTER CORPORATION</strong> — Projet de Synthèse</p>
            </div>
          </body>
          </html>

    - name: S'assurer que Nginx est démarré
      service:
        name: nginx
        state: started
        enabled: yes